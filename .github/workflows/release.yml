name: Release

# Tag-triggered release pipeline (ENGINEERING.md 6/7): a `v*` tag builds the
# five release targets, signs + notarizes where cert secrets are present, and
# assembles a draft GitHub release with SHA-256 checksums + an SBOM.
#
# Signing degrades to UNSIGNED artifacts with a loud warning when secrets are
# absent (fork/PR safety, and the pre-cert state per the M4 kickoff decision):
# the pipeline never silently skips a signing step, and never carries cert
# material in the repo.
#
# Linux target here is AppImage (+ .deb, which tauri emits for free). Flatpak
# packaging + Flathub publishing is Phase B (the tauri bundler cannot emit a
# Flatpak; that path needs a flatpak-builder manifest, which is Phase B's
# deliverable).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  GGML_NO_I8MM: 1

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Create or reuse draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists; reusing it"
            exit 0
          fi
          # A tag with a pre-release suffix (v0.9.0-rc.1) is marked pre-release.
          PRERELEASE=""
          case "$TAG" in *-*) PRERELEASE="--prerelease" ;; esac
          gh release create "$TAG" \
            --draft $PRERELEASE \
            --title "Verbatim $TAG" \
            --generate-notes

  build:
    name: Build ${{ matrix.artifact }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        # Five release targets. Feature sets mirror ci.yml's package job: each
        # artifact ships exactly the real backends its OS uses, not
        # --all-features.
        include:
          - os: macos-latest
            artifact: macos-arm64
            features: real-audio,real-transcription,real-polish,real-injection,global-hotkey
          - os: macos-15-intel
            artifact: macos-x64
            features: real-audio,real-transcription,real-polish,real-injection,global-hotkey
          - os: windows-latest
            artifact: windows-x64
            features: real-audio,real-transcription,real-polish,real-injection
          - os: ubuntu-24.04
            artifact: linux-x64
            features: real-audio,real-transcription,real-polish,real-injection
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libasound2-dev libwebkit2gtk-4.1-dev libgtk-3-dev
          libayatana-appindicator3-dev librsvg2-dev libxdo-dev libgtk-layer-shell-dev
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: ui/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Build frontend
        run: pnpm install --frozen-lockfile && pnpm build
        working-directory: ui

      # --- Signing setup (per-OS). Absent secrets => loud warning + unsigned. ---
      - name: Signing preflight (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -z "${{ secrets.APPLE_CERTIFICATE }}" ]; then
            echo "::warning title=Unsigned macOS build::APPLE_CERTIFICATE secret absent - producing UNSIGNED, un-notarized macOS artifacts. Gatekeeper (spctl --assess) will reject these. Wire the Developer ID cert secrets before a public release."
          fi

      - name: Configure Windows signing
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE) {
            Write-Output "::warning title=Unsigned Windows build::WINDOWS_CERTIFICATE secret absent - producing an UNSIGNED .msi. SmartScreen will warn on install. Wire the Authenticode cert before a public release."
            exit 0
          }
          # Import the OV .pfx into the user store; tauri signs by thumbprint.
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [IO.File]::WriteAllBytes("cert.pfx", $bytes)
          $pw = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath cert.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pw | Out-Null
          Remove-Item cert.pfx
          # Inject the (non-secret) thumbprint into the bundle config so the
          # tauri bundler Authenticode-signs the .msi. Kept out of the committed
          # config so an unsigned build is the default until the cert exists.
          $path = "crates/verbatim-app/tauri.conf.json"
          $conf = Get-Content $path -Raw | ConvertFrom-Json
          $conf.bundle.windows | Add-Member -NotePropertyName certificateThumbprint -NotePropertyValue $env:WINDOWS_CERTIFICATE_THUMBPRINT -Force
          $conf | ConvertTo-Json -Depth 32 | Set-Content $path

      - name: Build and bundle
        shell: bash
        env:
          # tauri reads these natively: it creates a temp keychain from
          # APPLE_CERTIFICATE, signs with the Developer ID identity + hardened
          # runtime, then notarizes + staples the .dmg via notarytool when the
          # APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID trio is present. All absent =>
          # an unsigned build (the preflight step already warned).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        # Raw tauri CLI from the repo root: the CLI discovers the config by
        # scanning subfolders (it lives in crates/verbatim-app) and auto-adds
        # the custom-protocol feature for release bundles. Mirrors ci.yml.
        run: ui/node_modules/.bin/tauri build --features ${{ matrix.features }}

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p dist
          shopt -s nullglob
          for f in \
            target/release/bundle/dmg/*.dmg \
            target/release/bundle/msi/*.msi \
            target/release/bundle/nsis/*-setup.exe \
            target/release/bundle/appimage/*.AppImage \
            target/release/bundle/deb/*.deb; do
            cp "$f" dist/
          done
          ls -la dist
          # Every target must produce at least one installer; an empty dist is
          # a bundler failure, not a valid release.
          test -n "$(ls -A dist)"

      - name: Upload to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber

  finalize:
    name: Checksums and SBOM
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: verbatim-sbom.spdx.json
      - name: Publish checksums and SBOM
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir dl && cd dl
          gh release download "$TAG" --dir .
          # Drop any prior-run manifest/SBOM so a re-run does not hash itself.
          rm -f SHA256SUMS verbatim-sbom.spdx.json
          sha256sum * > SHA256SUMS
          cd ..
          gh release upload "$TAG" dl/SHA256SUMS verbatim-sbom.spdx.json --clobber
