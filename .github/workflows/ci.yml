name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  GGML_NO_I8MM: 1

jobs:
  lint:
    name: Format and deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
      - uses: EmbarkStudios/cargo-deny-action@v2

  test:
    name: Clippy, test, build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # ROADMAP: "all platforms" = macOS ARM + Intel, Windows x64,
        # Ubuntu 24.04. X11/Wayland coverage joins once platform impls land.
        os: [macos-latest, macos-15-intel, windows-latest, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --locked --workspace --all-features
      - run: cargo build --locked --workspace --all-features
        env:
          GGML_NO_I8MM: 1
