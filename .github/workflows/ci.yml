name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Lets a PR exercise the main-pipeline bench job on demand.
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  GGML_NO_I8MM: 1

jobs:
  lint:
    name: Format and deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
      - uses: EmbarkStudios/cargo-deny-action@v2

  frontend:
    name: Frontend build and lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: ui/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  test:
    name: Clippy, test, build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # ROADMAP: "all platforms" = macOS ARM + Intel, Windows x64,
        # Ubuntu 24.04. X11/Wayland coverage joins once platform impls land.
        os: [macos-latest, macos-15-intel, windows-latest, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    # Every feature except whisper-vulkan and sherpa-onnx. whisper-vulkan
    # compiles whisper.cpp's Vulkan shader-gen toolchain from source, which needs
    # the Vulkan SDK and is fragile on hosted runners (MSBuild FileTracker path
    # limits on Windows, no GPU device). sherpa-onnx builds sherpa-onnx +
    # onnxruntime from source (static) and needs a heavier native toolchain
    # (ICU/eigen) that hosted Windows/macOS runners lack; it is covered on its
    # own Linux-only job below where the source build succeeds. Both are
    # validated off this cross-OS matrix. Mirrors the package job's "explicit
    # feature sets, not --all-features" rationale.
    env:
      FEATURES: verbatim-app/custom-protocol,verbatim-app/real-audio,verbatim-app/real-transcription,verbatim-app/real-injection,verbatim-app/global-hotkey,verbatim-engines/llama-cpp
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libasound2-dev libwebkit2gtk-4.1-dev libgtk-3-dev
          libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - run: cargo clippy --locked --workspace --all-targets --features "$FEATURES" -- -D warnings
        shell: bash
      - run: cargo test --locked --workspace --features "$FEATURES"
        shell: bash
      - run: cargo build --locked --workspace --features "$FEATURES"
        shell: bash
        env:
          GGML_NO_I8MM: 1

  sherpa:
    # sherpa-onnx (Parakeet FFI) is excluded from the cross-OS `test` matrix
    # because its `static` build compiles onnxruntime from source and needs an
    # ICU/eigen toolchain the hosted Windows/macOS runners lack. Linux runners
    # carry that toolchain, so the engine is clippy'd + tested here on every PR.
    name: Clippy + test sherpa-onnx engine (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --locked -p verbatim-engines --all-targets --features sherpa-onnx -- -D warnings
      - run: cargo test --locked -p verbatim-engines --features sherpa-onnx

  package:
    name: Package unsigned dev artifact (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        # Per-platform real feature sets, not --all-features: an artifact
        # ships exactly the backends its OS uses (plan phase 8). Signing and
        # notarization are the M4 release pipeline (ENGINEERING.md 7); M1
        # wants unsigned dev artifacts only.
        include:
          - os: macos-latest
            artifact: verbatim-dev-macos-arm64
            features: real-audio,real-transcription,real-injection,global-hotkey
          - os: macos-15-intel
            artifact: verbatim-dev-macos-x64
            features: real-audio,real-transcription,real-injection,global-hotkey
          - os: windows-latest
            artifact: verbatim-dev-windows-x64
            features: real-audio,real-transcription,real-injection
          - os: ubuntu-24.04
            artifact: verbatim-dev-linux-x64
            features: real-audio,real-transcription,real-injection
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libasound2-dev libwebkit2gtk-4.1-dev libgtk-3-dev
          libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: ui/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Build frontend
        run: pnpm install --frozen-lockfile && pnpm build
        working-directory: ui
      - run: cargo build --release --locked -p verbatim-app --features ${{ matrix.features }}
        env:
          GGML_NO_I8MM: 1
      # Unsigned Tauri bundle (M2 phase A). The CLI adds custom-protocol so the
      # bundle serves the embedded ui/dist; signing is the M4 release pipeline.
      # The Tauri CLI discovers tauri.conf.json by scanning subfolders, so it
      # must run from the repo root (the config lives in crates/verbatim-app).
      - name: Build Tauri bundle
        shell: bash
        run: ui/node_modules/.bin/tauri build --features ${{ matrix.features }}
        env:
          GGML_NO_I8MM: 1
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-bundle
          path: target/release/bundle/
          if-no-files-found: error
      - name: Archive binary (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C target/release verbatim
      - name: Archive binary (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/release/verbatim.exe -DestinationPath ${{ matrix.artifact }}.zip
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*
          if-no-files-found: error

  bench:
    name: Latency bench (${{ matrix.os }})
    # Main pipeline only (ENGINEERING.md 6): PRs stay fast, regressions are
    # caught on merge. workflow_dispatch lets a branch run it on demand.
    if: github.event_name != 'pull_request'
    needs: test
    strategy:
      fail-fast: false
      matrix:
        # ROADMAP M1 criterion 4 asserts the 800 ms p50 budget on real Apple
        # Silicon; that is a manual, hardware-bound measurement. GitHub's
        # macos runners are virtualised (Apple Paravirtual GPU, no real Metal)
        # and cannot meet it, so CI tracks per-runner baselines and gates on
        # >20% regressions instead of the reference-hardware budget.
        include:
          - os: macos-latest
            budget_ms: ""
          - os: windows-latest
            budget_ms: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache whisper model
        id: model-cache
        uses: actions/cache@v6
        with:
          path: ~/whisper-models
          key: ggml-base.en-q5
      - name: Download whisper model
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p ~/whisper-models
          curl -sSfL -o ~/whisper-models/ggml-base.en.bin \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin
      - name: Run latency bench
        shell: bash
        # Shared virtualised runners occasionally run wholesale slow (noisy
        # neighbours), which trips the 20% regression gate on a healthy build.
        # Retry once: a real regression reproduces, a slow runner rarely does.
        run: |
          MODEL="$HOME/whisper-models/ggml-base.en.bin"
          if [ "$RUNNER_OS" = "Windows" ]; then MODEL="$(cygpath -w "$MODEL")"; fi
          for attempt in 1 2; do
            if VERBATIM_WHISPER_MODEL="$MODEL" \
              cargo bench --locked -p verbatim-engines --features whisper-cpp --bench latency; then
              exit 0
            fi
            echo "latency bench attempt ${attempt} failed"
          done
          exit 1
        env:
          GGML_NO_I8MM: 1
          VERBATIM_BENCH_REQUIRE: 1
          VERBATIM_BENCH_BASELINE: ${{ matrix.os }}
          VERBATIM_BENCH_MAX_P50_MS: ${{ matrix.budget_ms }}

  polish-bench:
    name: Polish quality bench (${{ matrix.os }})
    # Main pipeline only, like the latency bench: PRs stay fast, prompt/engine
    # regressions are caught on merge. The similarity-guard and latency gates run
    # here; the exact-expectation golden is armed on reference hardware (a
    # committed golden), since greedy output is model-build specific.
    if: github.event_name != 'pull_request'
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache polish model
        id: model-cache
        uses: actions/cache@v6
        with:
          path: ~/polish-models
          key: qwen2.5-0.5b-instruct-q4km
      - name: Download polish model (best effort)
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        # Tolerant download: an unavailable model URL must not redden main. The
        # bench skips cleanly when the file is absent (see the run step), so the
        # gate degrades to a no-op rather than a failure on infra trouble.
        run: |
          mkdir -p ~/polish-models
          curl -sSfL -o ~/polish-models/polish.gguf \
            https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_k_m.gguf \
            || echo "polish model download failed; bench will skip"
      - name: Run polish bench
        shell: bash
        # Retry once for noisy-neighbour slowness, like the latency bench. Only
        # set VERBATIM_POLISH_MODEL when the file is actually present so a failed
        # download degrades to a clean skip instead of a hard failure.
        run: |
          MODEL="$HOME/polish-models/polish.gguf"
          if [ ! -s "$MODEL" ]; then
            echo "no polish model present; skipping polish bench"
            exit 0
          fi
          for attempt in 1 2; do
            if VERBATIM_POLISH_MODEL="$MODEL" \
              cargo bench --locked -p verbatim-engines --features llama-cpp --bench polish_quality; then
              exit 0
            fi
            echo "polish bench attempt ${attempt} failed"
          done
          exit 1
        env:
          GGML_NO_I8MM: 1
          VERBATIM_BENCH_BASELINE: ${{ matrix.os }}
