name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Lets a PR exercise the main-pipeline bench job on demand.
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  GGML_NO_I8MM: 1

jobs:
  lint:
    name: Format and deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
      - uses: EmbarkStudios/cargo-deny-action@v2

  frontend:
    name: Frontend build and lint
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: ui/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  test:
    name: Clippy, test, build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # ROADMAP: "all platforms" = macOS ARM + Intel, Windows x64,
        # Ubuntu 24.04. X11/Wayland coverage joins once platform impls land.
        os: [macos-latest, macos-15-intel, windows-latest, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libasound2-dev libwebkit2gtk-4.1-dev libgtk-3-dev
          libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --locked --workspace --all-features
      - run: cargo build --locked --workspace --all-features
        env:
          GGML_NO_I8MM: 1

  package:
    name: Package unsigned dev artifact (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        # Per-platform real feature sets, not --all-features: an artifact
        # ships exactly the backends its OS uses (plan phase 8). Signing and
        # notarization are the M4 release pipeline (ENGINEERING.md 7); M1
        # wants unsigned dev artifacts only.
        include:
          - os: macos-latest
            artifact: verbatim-dev-macos-arm64
            features: real-audio,real-transcription,real-injection,global-hotkey
          - os: macos-15-intel
            artifact: verbatim-dev-macos-x64
            features: real-audio,real-transcription,real-injection,global-hotkey
          - os: windows-latest
            artifact: verbatim-dev-windows-x64
            features: real-audio,real-transcription,real-injection
          - os: ubuntu-24.04
            artifact: verbatim-dev-linux-x64
            features: real-audio,real-transcription,real-injection
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libasound2-dev libwebkit2gtk-4.1-dev libgtk-3-dev
          libayatana-appindicator3-dev librsvg2-dev libxdo-dev
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: ui/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Build frontend
        run: pnpm install --frozen-lockfile && pnpm build
        working-directory: ui
      - run: cargo build --release --locked -p verbatim-app --features ${{ matrix.features }}
        env:
          GGML_NO_I8MM: 1
      # Unsigned Tauri bundle (M2 phase A). The CLI adds custom-protocol so the
      # bundle serves the embedded ui/dist; signing is the M4 release pipeline.
      # The Tauri CLI discovers tauri.conf.json by scanning subfolders, so it
      # must run from the repo root (the config lives in crates/verbatim-app).
      - name: Build Tauri bundle
        shell: bash
        run: ui/node_modules/.bin/tauri build --features ${{ matrix.features }}
        env:
          GGML_NO_I8MM: 1
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-bundle
          path: target/release/bundle/
          if-no-files-found: error
      - name: Archive binary (Unix)
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C target/release verbatim
      - name: Archive binary (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/release/verbatim.exe -DestinationPath ${{ matrix.artifact }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*
          if-no-files-found: error

  bench:
    name: Latency bench (${{ matrix.os }})
    # Main pipeline only (ENGINEERING.md 6): PRs stay fast, regressions are
    # caught on merge. workflow_dispatch lets a branch run it on demand.
    if: github.event_name != 'pull_request'
    needs: test
    strategy:
      fail-fast: false
      matrix:
        # ROADMAP M1 criterion 4 asserts the 800 ms p50 budget on real Apple
        # Silicon; that is a manual, hardware-bound measurement. GitHub's
        # macos runners are virtualised (Apple Paravirtual GPU, no real Metal)
        # and cannot meet it, so CI tracks per-runner baselines and gates on
        # >20% regressions instead of the reference-hardware budget.
        include:
          - os: macos-latest
            budget_ms: ""
          - os: windows-latest
            budget_ms: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache whisper model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: ~/whisper-models
          key: ggml-base.en-q5
      - name: Download whisper model
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p ~/whisper-models
          curl -sSfL -o ~/whisper-models/ggml-base.en.bin \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin
      - name: Run latency bench
        shell: bash
        run: |
          MODEL="$HOME/whisper-models/ggml-base.en.bin"
          if [ "$RUNNER_OS" = "Windows" ]; then MODEL="$(cygpath -w "$MODEL")"; fi
          VERBATIM_WHISPER_MODEL="$MODEL" \
            cargo bench --locked -p verbatim-engines --features whisper-cpp --bench latency
        env:
          GGML_NO_I8MM: 1
          VERBATIM_BENCH_REQUIRE: 1
          VERBATIM_BENCH_BASELINE: ${{ matrix.os }}
          VERBATIM_BENCH_MAX_P50_MS: ${{ matrix.budget_ms }}
