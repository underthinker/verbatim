name: Docs

on:
  push:
    branches: [main]
    paths: ["docs/site/**", ".github/workflows/docs.yml"]
  pull_request:
    paths: ["docs/site/**", ".github/workflows/docs.yml"]
  workflow_dispatch:

# Only the deploy job needs write scopes; the build job inherits read-only.
permissions:
  contents: read

# A superseded docs deploy has nothing worth finishing: cancel it. An
# in-flight deploy is left alone (`cancel-in-progress: false`) so Pages never
# sees a half-uploaded artifact.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: docs/site
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: docs/site/package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/site/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/site/dist

  deploy:
    name: Deploy to GitHub Pages
    # PRs verify the build only; main publishes. Pages must be enabled on the
    # repo with source "GitHub Actions" for this to succeed.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
