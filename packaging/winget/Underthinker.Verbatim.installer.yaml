# Installer manifest. __VERSION__ and __MSI_SHA256__ are filled by channels.yml
# from the tag and SHA256SUMS. The MSI is the tauri/WiX bundle; the release
# workflow Authenticode-signs it when the cert secret is present.
PackageIdentifier: Underthinker.Verbatim
PackageVersion: __VERSION__
InstallerLocale: en-US
Platform:
  - Windows.Desktop
MinimumOSVersion: 10.0.0.0
InstallerType: wix
Scope: user
InstallModes:
  - interactive
  - silent
  - silentWithProgress
UpgradeBehavior: install
ReleaseDate: __RELEASE_DATE__
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/underthinker/verbatim/releases/download/v__VERSION__/Verbatim___VERSION___x64_en-US.msi
    InstallerSha256: __MSI_SHA256__
ManifestType: installer
ManifestVersion: 1.6.0
