# cargo-deny configuration (ENGINEERING.md sections 3 and 8).

[graph]
all-features = true
# Evaluate the graph per shipped platform (matches the CI matrix) instead of
# unifying every cfg. This prunes deps that can never build for us - notably the
# macOS-only tray-icon's cfg(linux) GTK tree, which would otherwise be audited
# against a Linux it is never compiled for.
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    # Boost license: permissive, OSI-approved, FSF-free. Arrives via
    # clipboard-win / error-code on arboard's Windows clipboard backend (the
    # tray's copy-recent-dictation action, E-4).
    "BSL-1.0",
    # whisper-rs / whisper-rs-sys (the whisper.cpp bindings) are public domain.
    "Unlicense",
]
# Scoped to individual crates so the global policy stays tight. Both arrive
# through tray-icon (menu-bar presence). option-ext is weak file-level copyleft
# we only link, unmodified; target-lexicon rides tray-icon's Linux GTK build
# graph and is a permissive Apache variant.
exceptions = [
    { allow = ["MPL-2.0"], crate = "option-ext" },
    { allow = ["Apache-2.0 WITH LLVM-exception"], crate = "target-lexicon" },
    # Servo CSS crates arriving through tauri-utils' dom_query (HTML asset
    # rewriting at build/codegen time). MPL is file-level copyleft; we link
    # them unmodified, same rationale as option-ext.
    { allow = ["MPL-2.0"], crate = "cssparser" },
    { allow = ["MPL-2.0"], crate = "cssparser-macros" },
    { allow = ["MPL-2.0"], crate = "dtoa-short" },
    { allow = ["MPL-2.0"], crate = "selectors" },
    # Mozilla's curated TLS trust anchors, used by rustls in the sole
    # network-capable model downloader. CDLA-Permissive-2.0 permits use,
    # modification, and redistribution of the data.
    { allow = ["CDLA-Permissive-2.0"], crate = "webpki-roots" },
]

# tray-icon is the Tao/Tauri authors' crate; on Linux it draws in gtk-rs 0.18
# (GTK3), the same unmaintained-but-standard stack Tauri itself ships. We never
# compile it on the macOS slice, and the eventual Tauri shell inherits the same
# tree, so these unmaintained advisories are accepted rather than a blocker.
[advisories]
ignore = [
    "RUSTSEC-2024-0370", # proc-macro-error (via gtk3-macros/glib-macros)
    "RUSTSEC-2024-0411", # gtk-rs GTK3 bindings unmaintained
    "RUSTSEC-2024-0412", # gtk-rs GTK3 bindings unmaintained
    "RUSTSEC-2024-0413", # gtk-rs GTK3 bindings unmaintained
    "RUSTSEC-2024-0414", # gtk-rs GTK3 bindings unmaintained
    "RUSTSEC-2024-0415", # gtk-rs GTK3 bindings unmaintained
    "RUSTSEC-2024-0416", # gtk-rs GTK3 bindings unmaintained
    "RUSTSEC-2024-0417", # gtk-rs GTK3 bindings unmaintained
    "RUSTSEC-2024-0418", # gtk-rs GTK3 bindings unmaintained
    "RUSTSEC-2024-0419", # gtk-rs GTK3 bindings unmaintained
    "RUSTSEC-2024-0420", # gtk-rs GTK3 bindings unmaintained
    # gtk-layer-shell makes the overlay a non-focusable Wayland layer surface
    # (crates/verbatim-app/src/overlay.rs). Same unmaintained-but-standard GTK3
    # gtk-rs 0.18 stack as above, Linux-only, no compile on the macOS slice.
    "RUSTSEC-2024-0422", # gtk-layer-shell GTK3 bindings unmaintained
    "RUSTSEC-2024-0423", # gtk-layer-shell-sys GTK3 bindings unmaintained
    # quick-xml is build-time only here: wayland-scanner (proc-macro) parses
    # the wayland-protocols XML bundled in the crate, never untrusted input.
    "RUSTSEC-2026-0194", # quick-xml quadratic duplicate-attribute check
    "RUSTSEC-2026-0195", # quick-xml NsReader namespace allocation DoS
    # unic-* rides tauri-utils' urlpattern (URL pattern matching for the
    # webview IPC scope); unmaintained but frozen Unicode tables, no I/O.
    "RUSTSEC-2025-0075", # unic-char-range unmaintained
    "RUSTSEC-2025-0080", # unic-common unmaintained
    "RUSTSEC-2025-0081", # unic-char-property unmaintained
    "RUSTSEC-2025-0098", # unic-ucd-version unmaintained
    "RUSTSEC-2025-0100", # unic-ucd-ident unmaintained
]

[bans]
multiple-versions = "warn"
# ENGINEERING.md 8: no outbound-capable dependencies outside the model
# downloader. When the downloader crate lands, it gets a `wrappers` exception.
deny = [
    { crate = "reqwest", wrappers = ["verbatim-model-downloader"] },
    { crate = "ureq" },
    { crate = "curl" },
    { crate = "isahc" },
    { crate = "hyper", wrappers = ["reqwest", "hyper-rustls", "hyper-util"] },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
